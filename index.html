<style>
:root{
  /* Brand — DubeAI official */
  --cyan:#3BB7BF;
  --green:#8BC540;
  --navy:#0F1724;
  --navy-deep:#070b14;
  --text:#eef3f7;
  --muted:rgba(238,243,247,.62);
  --dim:rgba(238,243,247,.40);
  --faint:rgba(238,243,247,.20);
  --border:rgba(238,243,247,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--navy-deep);-webkit-text-size-adjust:100%}
body{
  font-family:'Inter Tight',Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--navy-deep);color:var(--text);line-height:1.5;
  min-height:100vh;min-height:100dvh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  display:flex;flex-direction:column;
}
.mono{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.04em}
a{color:inherit;text-decoration:none}

/* ───────── Ambient background ───────── */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:var(--navy-deep)}
/* aurora blobs */
.bg .aurora{position:absolute;border-radius:50%;filter:blur(90px);opacity:.55;mix-blend-mode:screen}
.bg .a1{width:60vw;height:60vw;left:-10vw;top:-18vw;background:radial-gradient(circle,rgba(59,183,191,.65),transparent 62%)}
.bg .a2{width:52vw;height:52vw;right:-14vw;bottom:-16vw;background:radial-gradient(circle,rgba(139,197,64,.5),transparent 62%)}
.bg .a3{width:44vw;height:44vw;left:38vw;top:34vh;background:radial-gradient(circle,rgba(59,183,191,.4),transparent 60%)}
/* moving grid */
.bg .grid{position:absolute;inset:-2px;opacity:.5;
  background-image:
    linear-gradient(rgba(238,243,247,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(238,243,247,.05) 1px,transparent 1px);
  background-size:52px 52px;
  mask-image:radial-gradient(ellipse 80% 70% at 50% 42%,#000 15%,transparent 78%);
  -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 42%,#000 15%,transparent 78%);}
/* grain / vignette */
.bg .vig{position:absolute;inset:0;background:radial-gradient(ellipse 120% 90% at 50% 40%,transparent 40%,rgba(7,11,20,.85) 100%)}

@media (prefers-reduced-motion: no-preference){
  .bg .a1{animation:drift1 22s ease-in-out infinite}
  .bg .a2{animation:drift2 26s ease-in-out infinite}
  .bg .a3{animation:drift3 30s ease-in-out infinite}
  .bg .grid{animation:gridpan 40s linear infinite}
  @keyframes drift1{50%{transform:translate(6vw,4vw) scale(1.12)}}
  @keyframes drift2{50%{transform:translate(-5vw,-3vw) scale(1.1)}}
  @keyframes drift3{50%{transform:translate(-4vw,5vw) scale(1.15);opacity:.28}}
  @keyframes gridpan{to{background-position:52px 52px}}
}

/* ───────── Layout ───────── */
.shell{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.topbar{padding:26px 32px;display:flex;justify-content:center}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 24px 24px}
footer{padding:22px 32px 30px;display:flex;flex-direction:column;align-items:center;gap:14px}

/* brand lockup — the dark asset already carries a navy plate */
.lockup{display:inline-flex;align-items:center;filter:drop-shadow(0 10px 40px rgba(59,183,191,.20))}
.lockup img{height:56px;width:auto;display:block;border-radius:10px}

/* status pill */
.status{display:inline-flex;align-items:center;gap:10px;margin-bottom:34px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;
  color:var(--cyan);padding:8px 16px;border:1px solid rgba(59,183,191,.42);background:rgba(59,183,191,.08);border-radius:100px;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.status .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 0 rgba(59,183,191,.5)}
@media (prefers-reduced-motion: no-preference){
  .status .dot{animation:ping 2s ease-out infinite}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(59,183,191,.5)}70%,100%{box-shadow:0 0 0 9px rgba(59,183,191,0)}}
}

/* headline */
h1{font-family:'Inter Tight',sans-serif;font-weight:800;
  font-size:clamp(52px,11vw,132px);line-height:1.06;letter-spacing:-.045em;
  padding-bottom:.08em;margin-bottom:20px;
  background:linear-gradient(100deg,#eef3f7 0%,#eef3f7 34%,var(--cyan) 52%,var(--green) 70%,#eef3f7 88%);
  background-size:220% 100%;-webkit-background-clip:text;background-clip:text;color:transparent}
@media (prefers-reduced-motion: no-preference){
  h1{animation:shimmer 7s ease-in-out infinite}
  @keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
}
.sub{font-size:clamp(16px,2vw,20px);line-height:1.6;color:var(--muted);max-width:540px;margin:0 auto 40px;font-weight:400}
.sub b{color:var(--text);font-weight:600}

/* compliance tags */
.tags{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:560px;margin:0 auto}
.tags span{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);border:1px solid var(--border);background:rgba(238,243,247,.03);padding:7px 13px;border-radius:100px;
  display:inline-flex;align-items:center;gap:8px;transition:border-color .25s,color .25s}
.tags span::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--cyan)}
.tags span:hover{border-color:rgba(59,183,191,.4);color:var(--text)}
.tags span:nth-child(even)::before{background:var(--green)}

/* footer */
.f-line{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px 16px;align-items:center}
.f-line .contact{color:var(--muted)}
.f-line a{color:var(--dim);transition:color .2s}
.f-line a:hover{color:var(--cyan)}
.f-sep{width:3px;height:3px;border-radius:50%;background:var(--faint)}

@media(max-width:560px){
  .topbar{padding:22px 20px}
  .lockup img{height:44px}
  main{padding:24px 20px}
  .status{letter-spacing:.18em;margin-bottom:26px}
}
</style>

    <h1>Coming&nbsp;soon.</h1>
    <p class="sub">Our new home is being built. <b>DubeAI</b> — custom-built GRC for Internal&nbsp;Controls, Risk,&nbsp;Audit and Compliance. <b>Deployed in your cloud. No SaaS. No lock-in.</b></p>
    <div class="tags">
      <span>SOX-404</span>
      <span>DORA</span>
      <span>ISO 27001</span>
      <span>NIS2</span>
      <span>MaRisk</span>
    </div>
  </main>

  <footer>
    <div class="f-line"><span class="contact">Contact&nbsp;·&nbsp;ai4grc@dube.eu</span></div>
    <div class="f-line">© 2026 DubeAI · GRC software you own.</div>
  </footer>

</div>

</body>
